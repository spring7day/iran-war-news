        .news-item:hover {

        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .news-time {
            font-size: 14px;
            color: #6e6e73;
            font-weight: 500;
        }

        .badge {

            font-weight: 600;

            letter-spacing: 0.5px;
        }

        .badge-breaking {
            background: #fff0f0;
            color: #d92b2b;
        }

        .badge-major {

            color: #e65100;
        }

        .badge-normal {
            background: #f5f5f7;
            color: #6e6e73;
        }

        .badge-category {
            background: #e8f4fd;
            color: #0066cc;
        }

        .badge-category.military {
            background: #fdecea;
            color: #c41e3a;
        }

        .badge-category.diplomacy {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-category.economy {
            background: #fff8e1;
            color: #f57c00;
        }

        .news-title {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
            line-height: 1.4;
        }

        .news-item.breaking .news-title {
            color: #d92b2b;
        }

        .news-summary {
            font-size: 17px;
            color: #6e6e73;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .news-source {
            font-size: 14px;
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .news-source:hover {
            color: #0077ed;
            text-decoration: underline;
        }

        .no-results {

            padding: 60px 20px;
            color: #6e6e73;
            font-size: 19px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 32px;
            }

            .news-item {
                padding: 20px;

            }

            .news-title {

            }

            .news-summary {

            }

            .filters {

            }

            .filter-btn {

                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            h1 {

        // Initialize
        let currentFilter = 'all';

        function formatTime(isoTime) {
            const date = new Date(isoTime);
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(hours / 24);

            if (days > 0) {
                return `${days}일 전`;
            } else if (hours > 0) {
                return `${hours}시간 전`;
            } else {
                const minutes = Math.floor(diff / (1000 * 60));
                return `${minutes}분 전`;
            }
        }

        function formatLastUpdated(isoTime) {
            const date = new Date(isoTime);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}.${month}.${day} ${hours}:${minutes} 업데이트`;
        }

        function getCategoryLabel(category) {
            const labels = {
                'military': '군사',
                'diplomacy': '외교',
                'economy': '경제',
                'other': '기타'
            };
            return labels[category] || category;
        }

        function renderTimeline(filter = 'all') {
            const timeline = document.getElementById('timeline');
            let items = newsData.items;

            // Filter items
            if (filter === 'breaking') {
                items = items.filter(item => item.importance === 'breaking');
            } else if (filter !== 'all') {
                items = items.filter(item => item.category === filter);
            }

            if (items.length === 0) {
                timeline.innerHTML = '<div class="no-results">해당하는 뉴스가 없습니다.</div>';
                return;
            }

            timeline.innerHTML = items.map(item => `
                <div class="news-item ${item.importance === 'breaking' ? 'breaking' : ''}">
                    <div class="news-header">
                        <span class="news-time">${formatTime(item.time)}</span>
                        <span class="badge badge-${item.importance}">${item.importance === 'breaking' ? '속보' : item.importance === 'major' ? '주요' : '일반'}</span>
                        <span class="badge badge-category ${item.category}">${getCategoryLabel(item.category)}</span>
                    </div>
                    <h2 class="news-title">${item.title}</h2>
                    <p class="news-summary">${item.summary}</p>
                    <a href="${item.url}" class="news-source" target="_blank" rel="noopener noreferrer">${item.source}에서 읽기 →</a>
                </div>
            `).join('');
        }

        // Set last updated time
        document.getElementById('lastUpdated').textContent = formatLastUpdated(newsData.lastUpdated);

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                currentFilter = filter;
                renderTimeline(filter);
            });
        });

        // Initial render
        renderTimeline();
    </script>
