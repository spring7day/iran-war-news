<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>이란 전쟁 속보</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; background: #fff; color: #1d1d1f; line-height: 1.5; }
.header { padding: 48px 24px 28px; border-bottom: 1px solid #e5e5ea; max-width: 800px; margin: 0 auto; }
.header h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
.header .meta { font-size: 13px; color: #6e6e73; margin-top: 6px; }
.filters { padding: 14px 24px; max-width: 800px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); z-index: 10; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #d2d2d7; background: #fff; font-size: 13px; cursor: pointer; color: #1d1d1f; transition: all 0.15s; }
.filter-btn.active, .filter-btn:hover { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }
.timeline { max-width: 800px; margin: 0 auto; padding: 0 24px 60px; }
.item { padding: 20px 0; border-bottom: 1px solid #f0f0f0; display: flex; gap: 16px; }
.item:last-child { border-bottom: none; }
.item-time { font-size: 12px; color: #6e6e73; min-width: 72px; padding-top: 3px; white-space: nowrap; }
.item-body { flex: 1; min-width: 0; }
.item-badges { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; flex-wrap: wrap; }
.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.badge-breaking { background: #fff0f0; color: #d92b2b; }
.badge-major { background: #fff5e6; color: #c05200; }
.badge-normal { background: #f5f5f7; color: #6e6e73; }
.badge-military { background: #eef2ff; color: #3451b2; }
.badge-diplomacy { background: #f0fdf4; color: #166534; }
.badge-economy { background: #fefce8; color: #854d0e; }
.badge-other { background: #f5f5f7; color: #6e6e73; }
.item-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
.item[data-importance="breaking"] .item-title { color: #d92b2b; }
.item-summary { font-size: 13px; color: #3d3d3f; line-height: 1.65; }
.item-source { display: inline-block; margin-top: 7px; font-size: 12px; color: #0071e3; text-decoration: none; }
.item-source:hover { text-decoration: underline; }
.loading { padding: 48px 24px; text-align: center; color: #6e6e73; max-width: 800px; margin: 0 auto; }
.empty { padding: 48px 24px; text-align: center; color: #6e6e73; }
@media (max-width: 600px) {
  .header { padding: 32px 16px 20px; }
  .header h1 { font-size: 24px; }
  .filters { padding: 10px 16px; }
  .timeline { padding: 0 16px 48px; }
  .item { gap: 10px; }
  .item-time { min-width: 58px; font-size: 11px; }
  .item-title { font-size: 14px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>🔴 이란 전쟁 속보</h1>
  <p class="meta">마지막 업데이트: <span id="lastUpdated">불러오는 중...</span> · 1시간마다 자동 갱신</p>
</div>
<div class="filters">
  <button class="filter-btn active" onclick="filter(this,'all')">전체 <span id="cnt-all"></span></button>
  <button class="filter-btn" onclick="filter(this,'breaking')">🔴 속보</button>
  <button class="filter-btn" onclick="filter(this,'military')">⚔️ 군사</button>
  <button class="filter-btn" onclick="filter(this,'diplomacy')">🤝 외교</button>
  <button class="filter-btn" onclick="filter(this,'economy')">📈 경제</button>
</div>
<div class="timeline" id="timeline"><div class="loading">뉴스를 불러오는 중...</div></div>

<script>
let allItems = [];

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString("ko-KR", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit",timeZone:"Asia/Seoul"});
}
function importanceLabel(i) { return {breaking:"🔴 속보", major:"주요", normal:"일반"}[i] || i; }
function categoryLabel(c) { return {military:"군사", diplomacy:"외교", economy:"경제", other:"기타"}[c] || c; }

function render(items) {
  const tl = document.getElementById("timeline");
  if (!items.length) { tl.innerHTML = '<div class="empty">해당 카테고리 뉴스가 없습니다.</div>'; return; }
  tl.innerHTML = items.map(item => `
    <div class="item" data-importance="${item.importance}" data-category="${item.category}">
      <div class="item-time">${formatTime(item.time)}</div>
      <div class="item-body">
        <div class="item-badges">
          <span class="badge badge-${item.importance}">${importanceLabel(item.importance)}</span>
          <span class="badge badge-${item.category}">${categoryLabel(item.category)}</span>
        </div>
        <div class="item-title">${item.title}</div>
        <div class="item-summary">${item.summary}</div>
        <a class="item-source" href="${item.url}" target="_blank" rel="noopener">↗ ${item.source}</a>
      </div>
    </div>`).join("");
}

function filter(btn, type) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const items = type === "all" ? allItems :
    type === "breaking" ? allItems.filter(i => i.importance === "breaking") :
    allItems.filter(i => i.category === type);
  render(items);
}

// 캐시 무효화: 매 요청마다 타임스탬프 쿼리 추가
fetch('news-data.json?v=' + Date.now(), { cache: 'no-store' })
  .then(r => r.json())
  .then(data => {
    allItems = data.items || [];
    document.getElementById("lastUpdated").textContent = formatTime(data.lastUpdated);
    document.getElementById("cnt-all").textContent = allItems.length + "건";
    render(allItems);
  })
  .catch(() => {
    document.getElementById("timeline").innerHTML = '<div class="empty">데이터를 불러오지 못했습니다. 잠시 후 새로고침 해주세요.</div>';
  });
</script>
</body>
</html>
